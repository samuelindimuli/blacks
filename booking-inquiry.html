<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Inquiry - EnjoymentClan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF5E14',
            secondary: '#1A1A1A',
            accent: '#FF9E00',
            dark: '#121212',
            light: '#FFFFFF',
            grayLight: '#F5F5F5',
            text: '#333333',
            textLight: '#777777',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
          },
          boxShadow: {
            sm: '0 2px 8px rgba(0,0,0,0.1)',
            md: '0 4px 12px rgba(0,0,0,0.15)',
            lg: '0 8px 24px rgba(0,0,0,0.2)',
          },
          borderRadius: {
            custom: '8px',
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn {
        @apply inline-block px-7 py-3 rounded-custom font-semibold uppercase tracking-wider text-sm transition-all duration-300 ease-in-out cursor-pointer text-center border-2 border-transparent;
      }
      .btn-primary {
        @apply bg-primary text-light hover:bg-[#E04E00] hover:-translate-y-1 hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed;
      }
      .btn-outline {
        @apply bg-transparent text-primary border-primary hover:bg-primary hover:text-light hover:-translate-y-1 hover:shadow-md;
      }
      .input-field {
        @apply w-full px-4 py-3 border border-gray-300 rounded-custom focus:outline-none focus:border-primary transition-all duration-300 focus:ring-4 focus:ring-primary/20;
      }
    }
  </style>
</head>
<body class="font-poppins text-text bg-light">
  <header class="fixed top-0 left-0 w-full py-5 bg-dark z-50 shadow-md">
    <div class="container mx-auto px-5 max-w-6xl">
      <div class="flex justify-between items-center">
        <div class="brand">
          <a href="index.html">
            <img src="pics/white.png" alt="EnjoymentClan Logo" class="h-20">
          </a>
        </div>
        <nav>
          <a href="index.html" class="text-light hover:text-primary">Back to Home</a>
        </nav>
      </div>
    </div>
  </header>

  <section class="pt-32 pb-20">
    <div class="container mx-auto px-5 max-w-2xl">
      <div class="bg-white p-8 md:p-10 rounded-custom shadow-md">
        <div class="text-center mb-10">
          <h2 class="text-3xl font-bold text-gray-800 mb-2 uppercase tracking-tight">Smart Inquiry</h2>
          <p class="text-gray-600">Provide your event details below for a tailored quote.</p>
        </div>

        <form id="bookingForm">
          <div class="space-y-6">
            <!-- Section 1: Event Basics -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div>
                <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Event Type</label>
                <select name="event_type" required class="input-field">
                  <option value="">Select Event Type</option>
                  <option value="Wedding">Wedding</option>
                  <option value="Corporate">Corporate Event</option>
                  <option value="Private Party">Private Party</option>
                  <option value="Club/Public Event">Club / Public Event</option>
                  <option value="Festival">Festival</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Event Date</label>
                <input type="date" name="event_date" required class="input-field">
              </div>
            </div>

            <!-- Section 2: Venue & Scale -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Precise Location (City, Venue Name)</label>
                <input type="text" name="location" placeholder="e.g. Nairobi, Villa Rosa Kempinski" required class="input-field">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Estimated Guests</label>
                <input type="number" name="guests" placeholder="e.g. 200" required class="input-field">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Duration (Hours)</label>
                <input type="number" name="duration" placeholder="e.g. 6" class="input-field">
              </div>
            </div>

            <!-- Section 3: Structural Needs -->
            <div>
              <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Structural Needs (Stage, Sound, Lighting)</label>
              <textarea name="requirements" placeholder="Describe any specific equipment or setup needs..." class="input-field min-h-[100px]"></textarea>
            </div>

            <!-- Section 4: Budget & Contact -->
            <div class="pt-5 border-t border-gray-100">
              <div>
                <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Baseline Budget (KSH)</label>
                <select name="budget" required class="input-field">
                  <option value="">Select Range</option>
                  <option value="Below 50,000">Below 50,000</option>
                  <option value="50,000 - 100,000">50,000 - 100,000</option>
                  <option value="100,000 - 250,000">100,000 - 250,000</option>
                  <option value="250,000 - 500,000">250,000 - 500,000</option>
                  <option value="Above 500,000">Above 500,000</option>
                </select>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-5">
                <div>
                  <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Contact Name</label>
                  <input type="text" name="contact_name" required class="input-field">
                </div>
                <div>
                  <label class="block text-sm font-semibold text-gray-500 mb-2 uppercase">Email Address</label>
                  <input type="email" name="contact_email" required class="input-field">
                </div>
              </div>
            </div>
          </div>

          <div class="mt-10">
            <button type="submit" class="btn btn-primary w-full py-4 text-lg">Send Booking Inquiry</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Success Modal -->
  <div id="successModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white p-8 rounded-lg shadow-lg text-center max-w-sm mx-auto">
      <i class="fas fa-check-circle text-green-500 text-5xl mb-4"></i>
      <h3 class="text-2xl font-bold text-gray-800 mb-3">Inquiry Sent!</h3>
      <p class="text-gray-600 mb-6">Thank you for your interest. We've received your inquiry and will get back to you shortly.</p>
      <button id="closeModalBtn" class="btn btn-primary">Close</button>
    </div>
  </div>

  <script>
    const bookingForm = document.getElementById('bookingForm');
    const successModal = document.getElementById('successModal');
    const closeModalBtn = document.getElementById('closeModalBtn');

    bookingForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(bookingForm);
      const data = Object.fromEntries(formData.entries());

      // Basic client-side validation for required fields
      const requiredFields = ['event_type', 'event_date', 'location', 'guests', 'budget', 'contact_name', 'contact_email'];
      for (const field of requiredFields) {
        if (!data[field]) {
          alert(`Please fill in the "${field.replace('_', ' ')}" field.`);
          return;
        }
      }

      // Simple email validation
      if (!/\S+@\S+\.\S+/.test(data.contact_email)) {
        alert('Please enter a valid email address.');
        return;
      }

      try {
        const submitBtn = bookingForm.querySelector('button[type="submit"]');
        submitBtn.textContent = 'Sending...';
        submitBtn.disabled = true;

        const response = await fetch('/api/inquiries', { // Assuming your backend is on the same origin or proxied
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data),
        });

        if (response.ok) {
          bookingForm.reset();
          successModal.classList.remove('hidden');
        } else {
          const errorData = await response.json();
          alert(`Failed to submit inquiry: ${errorData.error || 'Unknown error'}`);
        }
      } catch (error) {
        console.error('Submission error:', error);
        alert('An error occurred while submitting your inquiry. Please try again later.');
      } finally {
        const submitBtn = bookingForm.querySelector('button[type="submit"]');
        submitBtn.textContent = 'Send Booking Inquiry';
        submitBtn.disabled = false;
      }
    });

    closeModalBtn.addEventListener('click', () => {
      successModal.classList.add('hidden');
    });
  </script>
</body>
</html>
