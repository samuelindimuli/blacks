<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticketing - EnjoymentClan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF5E14',
            secondary: '#1A1A1A',
            accent: '#FF9E00',
            dark: '#121212',
            light: '#FFFFFF',
            grayLight: '#F5F5F5',
            text: '#333333',
            textLight: '#777777',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
          },
          boxShadow: {
            sm: '0 2px 8px rgba(0,0,0,0.1)',
            md: '0 4px 12px rgba(0,0,0,0.15)',
            lg: '0 8px 24px rgba(0,0,0,0.2)',
          },
          borderRadius: {
            custom: '8px',
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn {
        @apply inline-block px-7 py-3 rounded-custom font-semibold uppercase tracking-wider text-sm transition-all duration-300 ease-in-out cursor-pointer text-center border-2 border-transparent;
      }
      .btn-primary {
        @apply bg-primary text-light hover:bg-[#E04E00] hover:-translate-y-1 hover:shadow-md;
      }
      .btn-outline {
        @apply bg-transparent text-primary border-primary hover:bg-primary hover:text-light hover:-translate-y-1 hover:shadow-md;
      }
    }
  </style>
</head>
<body class="font-poppins text-text bg-light overflow-x-hidden">
  <header class="bg-dark text-light py-5">
    <div class="container mx-auto px-5 max-w-6xl">
      <div class="flex justify-between items-center">
        <div class="brand">
          <a href="index.html">
            <img src="pics/white.png" alt="EnjoymentClan Logo" class="h-20">
          </a>
        </div>
        <nav>
          <a href="index.html" class="text-light hover:text-primary">Back to Home</a>
        </nav>
      </div>
    </div>
  </header>

  <section class="py-20">
    <div class="container mx-auto px-5 max-w-6xl">
      <h1 class="text-4xl font-bold text-center mb-8">Ticketing Center</h1>
      <p class="text-lg text-center text-gray-600 mb-12">Purchase tickets for upcoming events</p>

      <div id="eventsContainer" class="min-h-96 flex items-center justify-center">
        <div class="text-center">
          <i class="fas fa-calendar-alt text-6xl text-primary mb-4"></i>
          <h2 class="text-3xl font-bold mb-2 text-gray-600">No Events Yet</h2>
          <p class="text-xl text-gray-500">Check back soon for upcoming events! 🎉</p>
        </div>
      </div>

      <!-- Event Cards (dynamically generated) -->
      <div id="eventsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-8"></div>

      <!-- Cart Summary -->
      <div class="mt-12 bg-white p-6 rounded-custom shadow-md hidden" id="cartSection">
        <h2 class="text-2xl font-bold mb-4">Cart Summary</h2>
        <div id="cartItems" class="space-y-3 mb-4"></div>
        <div class="border-t pt-4 flex justify-between items-center">
          <p class="text-lg font-semibold">Total: ksh<span id="totalPrice">0.00</span></p>
          <button id="checkoutBtn" class="btn btn-primary">Proceed to Checkout</button>
        </div>
      </div>

      <!-- Manual Confirmation Section -->
      <div class="mt-12 bg-white p-6 rounded-custom shadow-md border border-gray-100" id="manualConfirmSection">
        <h2 class="text-2xl font-bold mb-4 text-secondary">Manual Payment Verification</h2>
        <p class="text-sm text-gray-600 mb-6">If you have already paid but were not redirected, please enter your details below to generate your ticket.</p>
        <form id="manualConfirmForm" class="space-y-4">
          <div class="grid md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase text-gray-500">Order ID</label>
              <input type="text" id="manualOrderId" placeholder="e.g. ORD-172..." required class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:outline-none focus:border-primary">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-semibold uppercase text-gray-500">M-Pesa Transaction Code</label>
              <input type="text" id="manualMpesaCode" placeholder="Optional (e.g. SGR8...)" class="w-full px-4 py-3 border border-gray-300 rounded-custom focus:outline-none focus:border-primary">
            </div>
          </div>
          <button type="submit" id="manualVerifyBtn" class="btn btn-outline w-full py-4">Verify & Confirm Payment</button>
        </form>
      </div>
    </div>
  </section>
  <script src="config.js"></script>
  <script>
    const EVENTS_KEY = window.EC_CONFIG.eventsKey;
    const PURCHASES_KEY = window.EC_CONFIG.purchasesKey;
    const ANALYTICS_KEY = window.EC_CONFIG.analyticsKey;
    const defaultEvents = window.EC_CONFIG.defaultEvents;
    const API_BASE = window.EC_CONFIG.apiBaseUrl;

    let cart = [];

    // Get stored events from admin
    function getStoredEvents() {
      const stored = localStorage.getItem(EVENTS_KEY);
      if (!stored) {
        localStorage.setItem(EVENTS_KEY, JSON.stringify(defaultEvents));
        return defaultEvents;
      }
      try {
        const parsed = JSON.parse(stored);
        return Array.isArray(parsed) ? parsed : defaultEvents;
      } catch (e) {
        localStorage.setItem(EVENTS_KEY, JSON.stringify(defaultEvents));
        return defaultEvents;
      }
    }

    // Render events dynamically
    function renderEvents() {
      const events = getStoredEvents();
      const eventsList = document.getElementById('eventsList');
      const eventsContainer = document.getElementById('eventsContainer');
      const cartSection = document.getElementById('cartSection');

      if (!events || events.length === 0) {
        eventsList.innerHTML = '';
        eventsContainer.classList.remove('hidden');
        cartSection.classList.add('hidden');
        return;
      }

      eventsContainer.classList.add('hidden');
      eventsList.innerHTML = events.map(event => `
        <div class="bg-white p-6 rounded-custom shadow-md hover:shadow-lg transition">
          <h3 class="text-2xl font-bold mb-2">${event.title}</h3>
          <p class="text-gray-600 mb-2">
            <i class="fas fa-calendar-alt mr-2 text-primary"></i>
            ${new Date(event.date).toLocaleDateString()}
          </p>
          <p class="text-gray-600 mb-4">
            <i class="fas fa-map-marker-alt mr-2 text-primary"></i>
            ${event.location}
          </p>
          <p class="text-gray-700 mb-4">${event.description}</p>

          <div class="space-y-3">
            ${event.tickets.map((ticket, idx) => `
              <div class="border border-gray-200 p-3 rounded bg-gray-50">
                <div class="flex justify-between items-center mb-2">
                  <span class="font-semibold">${ticket.type}</span>
                  <span class="text-primary font-bold">ksh ${ticket.price}</span>
                </div>
                <div class="flex gap-2 items-center">
                  <input type="number" min="1" max="${ticket.available}" value="1" class="w-16 px-2 py-1 border border-gray-300 rounded text-center ticket-qty" data-event-id="${event.id}" data-ticket-type="${ticket.type}" data-price="${ticket.price}">
                  <span class="text-sm text-gray-500">${ticket.available} available</span>
                  <button class="btn btn-outline text-xs py-1 px-3 ml-auto add-to-cart" data-event-id="${event.id}" data-event-title="${event.title}" data-ticket-type="${ticket.type}" data-price="${ticket.price}">Add</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      // Add event listeners to buttons
      document.querySelectorAll('.add-to-cart').forEach(btn => {
        btn.addEventListener('click', addToCart);
      });
    }

    function addToCart(e) {
      const btn = e.target;
      const eventId = btn.dataset.eventId;
      const eventTitle = btn.dataset.eventTitle;
      const ticketType = btn.dataset.ticketType;
      const price = parseFloat(btn.dataset.price);

      const qtyInput = btn.parentElement.querySelector('.ticket-qty');
      const quantity = parseInt(qtyInput.value) || 1;

      cart.push({
        eventId,
        eventTitle,
        ticketType,
        price,
        quantity,
        total: price * quantity,
        id: Date.now()
      });

      updateCart();
      alert(`✅ Added ${quantity}x ${ticketType} ticket(s) for ${eventTitle}`);
    }

    function updateCart() {
      const cartSection = document.getElementById('cartSection');
      const cartItems = document.getElementById('cartItems');
      
      if (cart.length === 0) {
        cartSection.classList.add('hidden');
        return;
      }

      cartSection.classList.remove('hidden');
      
      let total = 0;
      cartItems.innerHTML = cart.map((item, idx) => {
        total += item.total;
        return `
          <div class="flex justify-between items-center bg-gray-50 p-3 rounded">
            <span>${item.quantity}x ${item.ticketType} - ${item.eventTitle}</span>
            <div class="flex gap-4 items-center">
              <span>ksh ${item.total}</span>
              <button onclick="removeFromCart(${idx})" class="text-red-600 hover:text-red-800 text-sm">Remove</button>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('totalPrice').textContent = total.toFixed(2);
    }

    function removeFromCart(idx) {
      cart.splice(idx, 1);
      updateCart();
    }

    document.getElementById('checkoutBtn')?.addEventListener('click', async () => {
      if (cart.length === 0) {
        alert('Cart is empty');
        return;
      }

      // Get customer phone number
      const phone = prompt('Enter your phone number (e.g., 0791615005):');
      if (!phone) return;

      // Validate phone format
      if (!/^(254|\+254|0)[17][0-9]{8}$/.test(phone.replace(/\s/g, ''))) {
        alert('Invalid phone number format. Please use format like 0791615005 or +254791615005');
        return;
      }

      const total = cart.reduce((sum, item) => sum + item.total, 0);

      const eventId = cart[0]?.eventId || 'unknown-event';
      const ticketType = cart.map(item => item.ticketType).join(', ');
      const ticketsCount = cart.reduce((sum, item) => sum + item.quantity, 0);

      try {
        const checkoutBtn = document.getElementById('checkoutBtn');
        checkoutBtn.textContent = 'Processing...';
        checkoutBtn.disabled = true;

        const createOrderResponse = await fetch(`${API_BASE}/orders/create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            eventId,
            amount: total,
            phone,
            ticketsCount,
            ticketType
          })
        });

        if (!createOrderResponse.ok) {
          throw new Error('Failed to create order');
        }

        const orderData = await createOrderResponse.json();
        const orderId = orderData.orderId;

        // Show the Order ID to the user immediately
        const orderDisplay = document.createElement('div');
        orderDisplay.className = "bg-blue-100 p-4 rounded mb-4 text-center border border-blue-200";
        orderDisplay.innerHTML = `<p class='text-sm text-blue-800'>Your Order ID: <strong class='font-mono'>${orderId}</strong></p><p class='text-xs text-blue-600 mt-1'>Save this in case you need to verify manually.</p>`;
        document.getElementById('cartSection').prepend(orderDisplay);

        checkoutBtn.textContent = 'Awaiting payment...';

        const stkResponse = await fetch(`${API_BASE}/mpesa/stk-push`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderId,
            amount: total,
            phone: phone.startsWith('254') ? phone : '254' + phone.slice(1)
          })
        });

        if (!stkResponse.ok) {
          const contentType = stkResponse.headers.get('content-type');
          const errorDetail = contentType && contentType.includes('application/json') 
            ? (await stkResponse.json()).error 
            : `Server error (${stkResponse.status})`;
          throw new Error(errorDetail || 'Failed to initiate payment');
        }

        // Update UI to show we are waiting for confirmation
        checkoutBtn.textContent = 'Waiting for M-Pesa...';

        const paymentResult = await pollPaymentStatus(orderId);

        if (paymentResult.status === 'CONFIRMED') {
          const purchases = JSON.parse(localStorage.getItem(PURCHASES_KEY) || '[]');
          purchases.push({
            type: 'Tickets',
            items: cart,
            total,
            phone,
            orderId,
            date: new Date().toISOString()
          });
          localStorage.setItem(PURCHASES_KEY, JSON.stringify(purchases));

          // Clear cart and redirect
          cart = [];
          updateCart();
          console.log('Redirecting to confirmation for Order:', orderId);
          window.location.href = `ticket-confirmation.html?orderId=${orderId}&phone=${phone}`;
        } else if (paymentResult.status === 'FAILED') {
          const failMsg = paymentResult.message || 'Payment was cancelled or failed. Please try again.';
          throw new Error(failMsg);
        } else {
          throw new Error('Payment timed out. If you completed payment, check your tickets page or contact support.');
        }
      } catch (error) {
        console.error('Checkout error:', error);
        alert(`❌ Error: ${error.message}\n\nMake sure the backend server is running: npm run dev`);
      } finally {
        const checkoutBtn = document.getElementById('checkoutBtn');
        checkoutBtn.textContent = 'Proceed to Checkout';
        checkoutBtn.disabled = false;
      }
    });

    async function pollPaymentStatus(orderId, maxAttempts = 20, intervalMs = 10000) {
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const response = await fetch(`${API_BASE}/mpesa/status/${orderId}`);
        const contentType = response.headers.get('content-type');
        if (response.ok && contentType && contentType.includes('application/json')) {
          const data = await response.json();
          console.log(`Polling attempt ${attempt + 1}:`, data.status);
          if (data.status === 'CONFIRMED' || data.status === 'FAILED') {
            return data;
          }
        }
        await new Promise(resolve => setTimeout(resolve, intervalMs));
      }
      return { status: 'TIMEOUT' };
    }

    // Manual Confirmation Handler
    document.getElementById('manualConfirmForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const orderId = document.getElementById('manualOrderId').value.trim();
      const mpesaCode = document.getElementById('manualMpesaCode').value.trim();
      const verifyBtn = document.getElementById('manualVerifyBtn');

      if (!orderId) return;

      try {
        verifyBtn.textContent = 'Verifying with M-Pesa...';
        verifyBtn.disabled = true;

        // We first call the status endpoint to see if it's already confirmed
        const checkResponse = await fetch(`${API_BASE}/mpesa/status/${orderId}`);
        if (!checkResponse.ok) {
          const contentType = checkResponse.headers.get('content-type');
          const errorData = contentType && contentType.includes('application/json') ? await checkResponse.json() : {};
          let msg = errorData.error || `Order not found (Status: ${checkResponse.status})`;
          if (checkResponse.status === 404) {
            msg += "\n\nTip: Double check if you need a hyphen (e.g. ORD-123). Also ensure you aren't using the M-Pesa Receipt code in the Order ID box.";
          }
          throw new Error(msg);
        }
        
        const checkData = await checkResponse.json();

        if (checkData.status === 'CONFIRMED') {
          window.location.href = `ticket-confirmation.html?orderId=${orderId}`;
          return;
        }

        // If not confirmed, we send the manual verification request
        const response = await fetch(`${API_BASE}/mpesa/verify-manual`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, mpesaCode })
        });

        const contentType = response.headers.get('content-type');
        if (response.ok && contentType && contentType.includes('application/json')) {
          const result = await response.json();
          alert('✅ Payment verified! Redirecting to your tickets...');
          window.location.href = `ticket-confirmation.html?orderId=${orderId}`;
        } else {
          const errorData = contentType && contentType.includes('application/json') ? await response.json() : null;
          throw new Error(errorData?.error || `Verification failed (Status: ${response.status})`);
        }
      } catch (error) {
        if (error.message.includes('Failed to fetch') || error.message.includes('ERR_CONNECTION_REFUSED')) {
          console.error('Connection Error:', error);
          alert('❌ Cannot connect to the server. Please ensure the backend is running (run "npm run dev" in your terminal).');
        } else {
          console.error('Manual verification error:', error);
          alert(`❌ Error: ${error.message}`);
        }
      } finally {
        verifyBtn.textContent = 'Verify & Confirm Payment';
        verifyBtn.disabled = false;
      }
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      renderEvents();
      // Refresh events every 5 seconds to catch admin updates
      setInterval(renderEvents, 5000);
    });
  </script>
</body>
</html>
